services:

  # ─── Databases ───────────────────────────────────────────────
  postgres-primary:
    image: postgres:16-alpine
    container_name: postgres-primary
    environment:
      POSTGRES_DB: maindb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecret
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:16-alpine
    container_name: postgres-replica
    environment:
      POSTGRES_DB: maindb
      POSTGRES_USER: readonly
      POSTGRES_PASSWORD: readonly123
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  mysql:
    image: mariadb:11
    container_name: mysql
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: legacydb
      MARIADB_USER: app
      MARIADB_PASSWORD: apppass
    ports:
      - "3306:3306"
    tmpfs:
      - /var/lib/mysql

  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: mongopass
    ports:
      - "27017:27017"
    tmpfs:
      - /data/db

  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  redis-sessions:
    image: redis:7-alpine
    container_name: redis-sessions
    command: redis-server --requirepass sessionpassword
    ports:
      - "6380:6379"

  cassandra:
    image: cassandra:4
    container_name: cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: TestCluster
      CASSANDRA_DC: datacenter1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    ports:
      - "9042:9042"
    tmpfs:
      - /var/lib/cassandra

  influxdb:
    image: influxdb:2.7-alpine
    container_name: influxdb
    environment:
      INFLUXD_NATS_PORT: "4222"
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: influxpass
      DOCKER_INFLUXDB_INIT_ORG: myorg
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
    ports:
      - "8086:8086"
    tmpfs:
      - /var/lib/influxdb2

  # ─── Message Brokers ──────────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"

  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: rabbit
      RABBITMQ_DEFAULT_PASS: rabbitpass
    ports:
      - "5672:5672"
    tmpfs:
      - /var/lib/rabbitmq

  # ─── Search ───────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    tmpfs:
      - /usr/share/elasticsearch/data

  kibana:
    image: kibana:8.13.0
    container_name: kibana
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

  # ─── Caching / KV ─────────────────────────────────────────────
  memcached:
    image: memcached:1.6-alpine
    container_name: memcached
    ports:
      - "11211:11211"
    command: memcached -m 128

  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd
    command:
      - etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"
      - "2380:2380"

  # ─── Observability ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    tmpfs:
      - /prometheus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: grafanapass
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    tmpfs:
      - /var/lib/grafana

  loki:
    image: grafana/loki:2.9.7
    container_name: loki
    ports:
      - "3100:3100"
    tmpfs:
      - /loki

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    ports:
      - "8080:8080"

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    ports:
      - "9100:9100"

  # ─── Dev Tools / Admin UIs ────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.6
    container_name: pgadmin
    depends_on:
      - postgres-primary
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: pgadminpass
    ports:
      - "5050:80"
    tmpfs:
      - /var/lib/pgadmin

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: mongopass
      ME_CONFIG_MONGODB_URL: mongodb://root:mongopass@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      REDIS_HOSTS: "cache:redis-cache:6379,sessions:redis-sessions:6380:sessionpassword"
    # Resolved conflict: Changed host port from 8082 to 8084 (8082 is used by redpanda)
    ports:
      - "8084:8081"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092
    ports:
      - "8083:8080"

  # ─── Reverse Proxy / Ingress ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"

  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:8888"
    ports:
      - "8888:8888"
      - "8484:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ─── Object Storage ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    tmpfs:
      - /data

  # ─── Auth ─────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-primary:5432/maindb
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: supersecret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: keycloakpass
    depends_on:
      - postgres-primary
    ports:
      - "8180:8080"

  # ─── CI / Task Runners ────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.45.1
    container_name: n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres-primary
      DB_POSTGRESDB_DATABASE: maindb
      DB_POSTGRESDB_USER: admin
      DB_POSTGRESDB_PASSWORD: supersecret
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: n8npass
    depends_on:
      - postgres-primary
    ports:
      - "5678:5678"
    tmpfs:
      - /home/node/.n8n

  # ─── Misc Filler Services ─────────────────────────────────────
  whoami-1:
    image: traefik/whoami
    container_name: whoami-1
    ports:
      - "9901:80"

  whoami-2:
    image: traefik/whoami
    container_name: whoami-2
    ports:
      - "9902:80"

  whoami-3:
    image: traefik/whoami
    container_name: whoami-3
    ports:
      - "9903:80"

  httpbin:
    image: kennethreitz/httpbin
    container_name: httpbin
    ports:
      - "9904:80"

  portainer:
    image: portainer/portainer-ce:2.20.3
    container_name: portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /data
    # Resolved conflict: Changed HTTP host port from 9000 to 9002 (9000 is used by minio)
    ports:
      - "9443:9443"
      - "9002:9000"